name: CI — Validate Skill & Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Validate SKILL.md
        run: python scripts/validate_skill.py skills/3d-website-architect/SKILL.md

      - name: Run eval summary
        run: python scripts/run_evals.py skills/3d-website-architect/evals/evals.json

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Check file structure
        run: |
          echo "Checking required files..."
          test -f skills/3d-website-architect/SKILL.md
          test -f skills/3d-website-architect/evals/evals.json
          test -f skills/3d-website-architect/references/design-systems.md
          test -f skills/3d-website-architect/references/3d-integration.md
          test -f skills/3d-website-architect/references/animation-patterns.md
          echo "All required files present ✓"
